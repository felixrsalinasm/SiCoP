{% extends 'base/base.html' %}

{% block contenido %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 50vh;">
    <div style="background-color: #0f3460; padding: 2.5rem; border-radius: 8px; max-width: 400px; text-align: center;">
        <h2 style="color: #ff0844; margin-top: 0;">Confirmar Eliminación</h2>
        <p>¿Estás seguro de que deseas eliminar permanentemente a <strong>{{ object.nombre_completo }}</strong>?</p>
        <p style="color: #cccccc; font-size: 0.9em; margin-bottom: 2rem;">Esta acción no se puede deshacer.</p>
        
        <form method="post">
            {% csrf_token %}
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a href="{% url 'personas:lista_personas' %}" class="btn" style="background-color: #1a1a2e;">Cancelar</a>
                <button type="submit" class="btn" style="background-color: #ff0844;">Eliminar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
