<!DOCTYPE html>
<html lang="es-mx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiCoP — CIC IPN</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
        }
        .navbar {
            background-color: #0f3460;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            color: #ffffff;
        }
        .navbar-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .btn {
            background-color: #e94560;
            color: #ffffff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 1rem;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .container {
            padding: 2rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard/" class="navbar-brand">SiCoP — CIC IPN</a>
        <div class="navbar-user">
            {% if user.is_authenticated %}
                <span>{{ user.get_full_name|default:user.username }} ({{ user.get_rol_display }})</span>
                <form method="post" action="/cuentas/logout/" style="margin: 0;">
                    {% csrf_token %}
                    <button type="submit" class="btn">Cerrar sesión</button>
                </form>
            {% endif %}
        </div>
    </nav>
    <main class="container">
        {% block contenido %}{% endblock %}
    </main>
</body>
</html>
