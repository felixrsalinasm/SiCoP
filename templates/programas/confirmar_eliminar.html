{% extends 'base/base.html' %}

{% block contenido %}
<div style="max-width: 600px; margin: 2rem auto; background-color: #0f3460; padding: 2rem; border-radius: 8px;">
    <h2 style="color: #e94560;">Confirmar eliminacion</h2>
    <p>Esta a punto de eliminar: <strong>{{ object }}</strong></p>
    <p style="color: #f6d365;">Esta accion no se puede deshacer.</p>
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button type="submit" class="btn" style="background-color: #e94560;">Eliminar</button>
            <a href="javascript:history.back()" class="btn" style="background-color: #4facfe; color: #1a1a2e;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
